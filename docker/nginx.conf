server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Suporte ao Vue Router history mode
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo para assets estáticos com hash no nome
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|webp|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Sem cache para o index.html (sempre busca a versão mais recente)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
